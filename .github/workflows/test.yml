name: Test

on:
  push:
    branches:
      - "*"
      - "!main"
  workflow_call:
jobs:
  test:
    if: true
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      repository-projects: read
    steps:
    - uses: swift-actions/setup-swift@v1.25.0
      with:
          swift-version: "6.0"
    - uses: actions/checkout@v3
    - name: Run Tests
      working-directory: FinancePackage
      run: swift test
